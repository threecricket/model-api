name: Publish Lambda Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  ECR_REPOSITORY: model-api
  LAMBDA_FUNCTION_NAME: threecricket-live-model-api

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'release/v') ||
      startsWith(github.event.head_commit.message, 'chore: release v') ||
      startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    environment: live
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          pip install uv
          echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to live Lambda
        run: |
          pip install boto3
          ARGS=(
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME || env.LAMBDA_FUNCTION_NAME }}"
            --image-uri "${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          )
          if [ -n "${{ vars.LAMBDA_CONFIG_SECRET }}" ]; then
            ARGS+=(--secret-id "${{ vars.LAMBDA_CONFIG_SECRET }}")
          fi
          python .github/scripts/deploy_lambda.py "${ARGS[@]}"
