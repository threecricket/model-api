name: Publish Lambda Image (Dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write

env:
  ECR_REPOSITORY: model-api
  LAMBDA_FUNCTION_NAME: threecricket-dev-model-api

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to dev Lambda
        run: |
          pip install boto3
          ARGS=(
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME || env.LAMBDA_FUNCTION_NAME }}"
            --image-uri "${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          )
          if [ -n "${{ vars.LAMBDA_CONFIG_SECRET }}" ]; then
            ARGS+=(--secret-id "${{ vars.LAMBDA_CONFIG_SECRET }}")
          fi
          python .github/scripts/deploy_lambda.py "${ARGS[@]}"
