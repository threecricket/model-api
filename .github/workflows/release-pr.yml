name: Release PR

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    if: >-
      ${{ !startsWith(github.event.head_commit.message, 'chore: release v') &&
          !startsWith(github.event.head_commit.message, 'Release v') &&
          !contains(github.event.head_commit.message, 'release/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Install uv
        run: pip install uv

      - name: Compute next version
        id: version
        run: |
          cp pyproject.toml pyproject.toml.bak
          uv version --bump patch
          echo "next=$(uv version --short)" >> "$GITHUB_OUTPUT"
          mv pyproject.toml.bak pyproject.toml

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Find existing release PR
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --state open --base main --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release/v"))][0] // empty')
          if [ -n "$PR" ]; then
            echo "number=$(echo "$PR" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "branch=$(echo "$PR" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            VERSION="${{ steps.existing.outputs.branch }}"
            VERSION="${VERSION#release/v}"
          else
            VERSION="${{ steps.version.outputs.next }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            TAG_DATE=$(git log -1 --format=%cI "$LAST_TAG")
          else
            TAG_DATE="1970-01-01T00:00:00Z"
          fi

          CHANGES=$(gh pr list --state merged --base main --limit 100 \
            --json number,title,headRefName,mergedAt \
            --jq --arg since "$TAG_DATE" '
              [.[]
                | select(.headRefName | startswith("release/v") | not)
                | select(.mergedAt > $since)
              ]
              | sort_by(.mergedAt)
              | .[]
              | "- \(.title) (#\(.number))"
            ')

          if [ -z "$CHANGES" ] && [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "${LAST_TAG}..origin/main" --pretty=format:'- %s' --no-merges)
          elif [ -z "$CHANGES" ]; then
            CHANGES=$(git log origin/main --pretty=format:'- %s' --no-merges -20)
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="- No changes"
          fi

          BODY_FILE="${RUNNER_TEMP}/release-body.md"
          {
            printf '%s\n\n' "## Release v${VERSION}"
            printf '%s\n\n' "Merge to publish Docker image to ECR."
            printf '%s\n\n' "### Changes"
            printf '%s\n' "$CHANGES"
          } > "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Update existing release PR
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin "${{ steps.existing.outputs.branch }}"
          git checkout "${{ steps.existing.outputs.branch }}"
          set +e
          git merge origin/main -m "chore: merge main into release branch"
          MERGE_STATUS=$?
          set -e
          if [ "$MERGE_STATUS" -ne 0 ]; then
            if git diff --name-only --diff-filter=U | grep -q '^pyproject.toml$'; then
              git checkout --ours pyproject.toml
              git add pyproject.toml
              if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
                echo "Unresolved merge conflicts remain"
                exit 1
              fi
              git commit -m "chore: merge main into release branch"
            else
              echo "Merge failed"
              exit 1
            fi
          fi
          git push origin "${{ steps.existing.outputs.branch }}"
          gh pr edit "${{ steps.existing.outputs.number }}" \
            --body-file "${{ steps.notes.outputs.body_file }}"

      - name: Create release PR
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.notes.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
            uv version --bump patch
            git add pyproject.toml
            git commit -m "chore: release v${VERSION}"
            git push -u origin "$BRANCH"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body-file "${{ steps.notes.outputs.body_file }}"
